<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONE ERA | Đăng Ký Đại Lý</title>
  <link rel="icon" type="image/png" href="images/icon.png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="daily.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <div class="glassContainer">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <div class="backBtn" onclick="history.back()">
        <span>← QUAY LẠI</span>
      </div>
      <!-- <img src="images/logo-one-era.png" alt="Logo" class="form-logo-small"> -->
    </div>

    <h1 class="title">ĐĂNG KÝ TIẾP ĐÓN ĐẠI LÝ</h1>

    <form id="form-daily">
      <div style="position: relative; margin-bottom: 2rem;">
        <label class="label">ĐƠN VỊ ĐẠI LÝ *</label>
        <div class="customSelectHeader" id="agencyHeader">
          <span id="selectedAgencyText" style="color: var(--color-lavender);">-- Chọn Đại lý --</span>
          <span style="color: var(--color-sunset); font-size: 10px;">▼</span>
        </div>
        
        <input type="hidden" name="agencyName" id="agencyValue" required>

        <div class="dropdownList" id="agencyDropdown" style="display: none;">
          <div class="scrollArea" id="agencyList">
            </div>
        </div>

        <div id="extraInputContainer" class="extraInputContainer" style="display: none;">
          <input type="text" id="customAgencyInput" name="customAgencyName" class="regInputExtra" placeholder="Nhập tên đại lý của bạn...">
        </div>
      </div>

      <div class="formGrid">
        <div>
          <label class="label">HỌ TÊN NHÂN VIÊN *</label>
          <input type="text" class="regInput" name="staffName" required>
        </div>
        <div>
          <label class="label">CCCD NHÂN VIÊN</label>
          <input type="text" class="regInput" name="idNumber">
        </div>
        <div style="grid-column: span 2;">
          <label class="label">SỐ ĐIỆN THOẠI NHÂN VIÊN *</label>
          <input type="tel" class="regInput" name="phoneNumber" required>
        </div>
      </div>

      <div class="formGrid" style="margin-top: 1.5rem;">
        <div>
          <label class="label">TÊN KHÁCH HÀNG (VIẾT TẮT)</label>
          <input type="text" class="regInput" name="customerName" placeholder="VD: Anh ...">
        </div>
        <div>
          <label class="label">4 SỐ CUỐI SĐT KHÁCH</label>
          <input type="text" class="regInput" name="customerPhoneSuffix" maxlength="4" placeholder="____">
        </div>
      </div>

      <div class="subSelectionArea">
        <div>
          <label class="label">SL KHÁCH</label>
          <input type="number" class="regInput" name="quantity" value="1" min="1">
        </div>
        <div>
          <label class="label">NGÀY</label>
          <input type="date" class="regInput" id="visitDate" name="visitDate" required>
        </div>
        <div>
          <label class="label">KHUNG GIỜ</label>
          <select class="regInput" name="visitTime" required>
            <option value="09:00-10:30">09:00 – 10:30</option>
            <option value="10:30-12:00">10:30 – 12:00</option>
            <option value="13:00-14:30">13:00 – 14:30</option>
            <option value="14:30-16:00">14:30 – 16:00</option>
          </select>
        </div>
      </div>

      <div style="margin-top: 1.5rem;">
                <label class="label" data-vi="Ghi chú thêm" data-en="Additional Notes"></label>
                <textarea class="regInput" name="notes" rows="3" 
                    data-ph-vi="Nhập yêu cầu đặc biệt hoặc ghi chú tại đây..." 
                    data-ph-en="Enter special requests or notes here..."
                    style="resize: none;"></textarea>
      </div>

      <button type="submit" class="btnSubmit">XÁC NHẬN ĐĂNG KÝ</button>
    </form>
  </div>

  <div id="success-modal" class="modal-overlay">
      <div class="modal-content">
        <img src="images/logo-one-era.png" alt="One Era Logo" class="modal-logo" />
        <h3 id="modal-title">✅ Đăng ký thành công!</h3>
        <p id="modal-message">
          Chào Mừng Đến Với One Era <span id="countdown">4</span> giây.
        </p>
        <button id="confirm-btn">Xác nhận</button>
      </div>
    </div>

  <script>
    // Logic Dropdown Đại lý
    const agencies = [
      "THE ONE REAL ESTATE", "REVER", "REALPLUS", "QS LAND", "INDOCHINE", 
      "ERA VIỆT NAM", "LỘC PHÁT HƯNG & STHOME", "BÁCH NHƯ", "DOUBLE LAND", 
      "GENIE PROPERTY", "KZEN HOLDINGS", "THẾ GIỚI ĐẤT VIỆT", "VẠN XUÂN SERVICE", 
      "SGROUP", "KIM OANH REALTY", "KHÁC (VUI LÒNG NHẬP)"
    ];

    const header = document.getElementById('agencyHeader');
    const dropdown = document.getElementById('agencyDropdown');
    const listContainer = document.getElementById('agencyList');
    const selectedText = document.getElementById('selectedAgencyText');
    const agencyValue = document.getElementById('agencyValue');
    const extraContainer = document.getElementById('extraInputContainer');

    agencies.forEach(agency => {
      const item = document.createElement('div');
      item.className = 'dropdownItem';
      item.innerText = agency;
      item.onclick = () => {
        selectedText.innerText = agency;
        selectedText.style.color = "#ffffff";
        agencyValue.value = agency;
        dropdown.style.display = 'none';
        if (agency.includes("KHÁC")) {
          extraContainer.style.display = 'block';
        } else {
          extraContainer.style.display = 'none';
        }
      };
      listContainer.appendChild(item);
    });

    header.onclick = (e) => {
      e.stopPropagation();
      dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
    };
    window.onclick = () => dropdown.style.display = 'none';

    // Set giới hạn ngày
    const dateInput = document.getElementById('visitDate');
    
    // 1. Lấy ngày hiện tại (Hôm nay)
    const now = new Date();
    const todayStr = now.toISOString().split('T')[0];
    
    // 2. Tính toán ngày tối đa (Hôm nay + 2 ngày)
    const maxDate = new Date();
    maxDate.setDate(now.getDate() + 2);
    const maxStr = maxDate.toISOString().split('T')[0];

    // 3. Gán vào Input
    dateInput.value = todayStr; // Mặc định chọn hôm nay
    dateInput.min = todayStr;   // Không được chọn ngày quá khứ
    dateInput.max = maxStr;     // Chỉ được chọn trong vòng 2 ngày tới
  </script>
</body>
</html>
