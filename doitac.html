<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONE ERA | Đăng Ký Đối Tác</title>
  <link rel="icon" type="image/png" href="images/icon.png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="khach.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <div class="glassContainer">
    <div onclick="history.back()" style="cursor:pointer; color:var(--color-lavender); font-size:12px; margin-bottom:1rem;">← QUAY LẠI</div>
    <h1 class="title" id="form-title" data-vi="ĐĂNG KÝ ĐỐI TÁC" data-en="PARTNER REGISTRATION">ĐĂNG KÝ ĐỐI TÁC</h1>

    <form id="form-doitac">
      <div class="formGrid">
        <div>
          <label class="label" data-vi="Họ và tên" data-en="Full Name"></label>
          <input type="text" class="regInput" name="fullName"
            data-ph-vi="Nhập họ và tên" data-ph-en="Enter full name" required>
        </div>
        <div>
          <label class="label" data-vi="Số CCCD" data-en="ID Number"></label>
          <input type="text" class="regInput" name="idNumber"
            data-ph-vi="Nhập số CCCD" data-ph-en="Enter ID number">
        </div>
        <div>
          <label class="label" data-vi="Số điện thoại" data-en="Phone Number"></label>
          <input type="tel" class="regInput" name="phoneNumber"
            data-ph-vi="Nhập số điện thoại" data-ph-en="Enter phone number" required>
        </div>
        <div>
          <label class="label" data-vi="Công ty" data-en="Company"></label>
          <input type="text" class="regInput" name="company"
            data-ph-vi="Tên công ty" data-ph-en="Company name">
        </div>
        <div>
          <label class="label" data-vi="Bộ phận tiếp nhận" data-en="Receiving Department"></label>
          <input type="text" class="regInput" name="recDepartment"
            data-ph-vi="Tên bộ phận" data-ph-en="Department name">
        </div>
        <div>
          <label class="label" data-vi="Nhân sự tiếp nhận" data-en="Receiving Staff"></label>
          <input type="text" class="regInput" name="recStaff"
            data-ph-vi="Tên nhân sự" data-ph-en="Staff name">
        </div>
      </div>

      <div class="subSelectionArea">
        <div>
          <label class="label" data-vi="Số người" data-en="Guests"></label>
          <input type="number" class="regInput" name="quantity" value="1" min="1" max="25">
        </div>
        <div>
          <label class="label" data-vi="Ngày" data-en="Date"></label>
          <input type="date" class="regInput" id="visitDate" name="visitDate" required>
        </div>
        <div>
          <label class="label" data-vi="Giờ" data-en="Time"></label>
          <select class="regInput" id="visitTime" name="visitTime" required>
            <option value="09:00-10:30">09:00 – 10:30</option>
            <option value="10:30-12:00">10:30 – 12:00</option>
            <option value="13:00-14:30">13:00 – 14:30</option>
            <option value="14:30-16:00">14:30 – 16:00</option>
          </select>
        </div>
      </div>

      <div style="margin-top: 1.5rem;">
        <label class="label" data-vi="Ghi chú" data-en="Notes"></label>
        <textarea class="regInput" name="notes" rows="3"
          data-ph-vi="Ghi chú thêm (nếu có)"
          data-ph-en="Additional notes (optional)"
          style="resize: none;"></textarea>
      </div>

      <button type="submit" class="btnSubmit" data-vi="GỬI ĐĂNG KÝ" data-en="SUBMIT">GỬI ĐĂNG KÝ</button>
    </form>
  </div>

  <div id="success-modal" class="modal-overlay">
    <div class="modal-content">
      <img src="images/logo-one-era.png" alt="One Era Logo" class="modal-logo" />
      <h3 id="modal-title">✅ Đăng ký thành công!</h3>
      <p id="modal-message">
        Chào Mừng Đến Với One Era <span id="countdown">4</span> giây.
      </p>
      <button id="confirm-btn">Xác nhận</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>
