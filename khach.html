<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE ERA | Đăng Ký</title>
    <link rel="icon" type="image/png" href="images/icon.png" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="khach.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="glassContainer">
        <div onclick="history.back()" style="cursor:pointer; color:var(--color-lavender); font-size:12px; margin-bottom:1rem;">← QUAY LẠI</div>
        <h1 class="title" data-vi="ĐĂNG KÝ TRẢI NGHIỆM" data-en="REGISTRATION">ĐĂNG KÝ TRẢI NGHIỆM</h1>

        <form id="form-khach">
            <div class="formGrid">
                <div>
                    <label class="label" data-vi="Họ tên" data-en="Full Name"></label>
                    <input type="text" class="regInput" name="fullName" required>
                </div>
                <div>
                    <label class="label" data-vi="Số CCCD" data-en="ID Number"></label>
                    <input type="text" class="regInput" name="idNumber" required>
                </div>
                <div>
                    <label class="label" data-vi="Số điện thoại" data-en="Phone"></label>
                    <input type="tel" class="regInput" name="phoneNumber" required>
                </div>
                <div>
                    <label class="label" data-vi="Email" data-en="Email"></label>
                    <input type="email" class="regInput" name="email">
                </div>
            </div>

            <div class="subSelectionArea">
                <div>
                    <label class="label" data-vi="Số người" data-en="Guests"></label>
                    <input type="number" class="regInput" name="quantity" value="1" min="1">
                </div>
                <div>
                    <label class="label" data-vi="Ngày đi" data-en="Date"></label>
                    <input type="date" class="regInput" id="visitDate" name="visitDate" required>
                </div>
                <div>
                    <label class="label" data-vi="Giờ" data-en="Time"></label>
                    <div style="position: relative;">
                        <input type="hidden" id="visitTime" name="visitTime" value="09:00-10:30">
                        <div class="custom-select-box" id="visitTimeBox">
                            <span id="selectedTimeText">09:00 – 10:30</span>
                            <svg class="chevron" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                        </div>
                        <div class="custom-menu" id="visitTimeMenu">
                            <div class="menu-item" data-value="09:00-10:30">09:00 – 10:30</div>
                            <div class="menu-item" data-value="10:30-12:00">10:30 – 12:00</div>
                            <div class="menu-item" data-value="13:00-14:30">13:00 – 14:30</div>
                            <div class="menu-item" data-value="14:30-16:00">14:30 – 16:00</div>
                        </div>
                    </div>
                </div>
            </div>

            <div style="margin-top: 1.5rem;">
                <label class="label" data-vi="Ghi chú thêm" data-en="Additional Notes"></label>
                <textarea class="regInput" name="notes" rows="3" 
                    data-ph-vi="Nhập yêu cầu đặc biệt hoặc ghi chú tại đây..." 
                    data-ph-en="Enter special requests or notes here..."
                    style="resize: none;"></textarea>
            </div>

            <button type="submit" class="btnSubmit" data-vi="XÁC NHẬN" data-en="CONFIRM">XÁC NHẬN</button>
        </form>
    </div>

    <div id="success-modal" class="modal-overlay">
      <div class="modal-content">
        <img src="images/logo-one-era.png" alt="One Era Logo" class="modal-logo" />
        <h3 id="modal-title">✅ Đăng ký thành công!</h3>
        <p id="modal-message">
          Chào Mừng Đến Với One Era <span id="countdown">4</span> giây.
        </p>
        <button id="confirm-btn">Xác nhận</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  </body>
</html>
